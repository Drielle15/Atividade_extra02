<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesquisa de Habitantes</title>
</head>
<body>
  <h2>Habitantes</h2>

  <form id="formPesquisa">
    <label for="idade">Idade:</label>
    <input type="number" id="idade"><br><br>

    <label for="sexo">Sexo:</label>
    <select id="sexo">
      <option value="M">Masculino</option>
      <option value="F">Feminino</option>
    </select><br><br>

    <label for="renda">Renda (R$):</label>
    <input type="number" id="renda" step="0.01"><br><br>

    <button type="submit">Registrar Pessoa</button>
  </form>

  <p id="mensagem"></p>
  <p id="resultado"></p>

 <script src="js/scripts_extra05.js"></script>
</body>
</html>
