<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Pessoas</title>
</head>
<body>
    <h2>Cadastro de 20 Pessoas</h2>

    <form id="formPessoa">
        <label for="nome">Nome:</label>
        <input type="text" id="nome"><br><br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade"><br><br>

        <label for="sexo">Sexo:</label>
        <select id="sexo">
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
        </select><br><br>

        <button type="submit">Registrar Pessoa</button>
    </form>

    <p id="mensagem"></p>
    <p id="resultado"></p>
<script src="js/scripts_extra04.js"></script>
</body>
</html>
